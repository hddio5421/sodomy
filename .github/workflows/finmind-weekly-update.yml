name: FinMind weekly update

on:
  workflow_dispatch:
  # 排程改由 Cloudflare Worker 觸發（workflow_dispatch），不依賴 GitHub 內建 cron。
  # Cloudflare cron: 0 14-18 * * 5（UTC 週五，對應台灣時間週五 22:00 ~ 週六 02:00）

permissions:
  contents: write

concurrency:
  group: finmind-weekly-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      RAW_CACHE_KEY: finmind-raw-Linux-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
      RAW_CACHE_PREFIX: finmind-raw-Linux-${{ github.ref_name }}-

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate FinMind secret
        shell: bash
        run: |
          if [ -z "$FINMIND_TOKEN" ]; then
            echo "::error::Repository secret FINMIND_TOKEN is not configured."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Restore resumable FinMind cache
        id: raw-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: data/raw
          key: ${{ env.RAW_CACHE_KEY }}
          restore-keys: |
            ${{ env.RAW_CACHE_PREFIX }}

      - name: Download one resumable batch
        id: download
        continue-on-error: true
        run: python src/run_downloader.py --end auto --batch-size 550 --sleep 0.15

      - name: Show progress
        if: always() && hashFiles('data/raw/stock_info.csv') != ''
        run: python src/run_downloader.py --status

      - name: Commit completed web data
        if: steps.download.outcome == 'success'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- data/processed/chart_index.json data/processed/capital_history.csv data/processed/series data/processed/signals
          if git diff --cached --quiet; then
            echo "No completed full-market web update to commit."
            exit 0
          fi
          git commit -m "data: update FinMind weekly market data"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Save resumable FinMind cache
        if: always() && hashFiles('data/raw/**') != ''
        uses: actions/cache/save@v4
        with:
          path: data/raw
          key: ${{ env.RAW_CACHE_KEY }}

      - name: Fail after preserving progress
        if: steps.download.outcome == 'failure'
        shell: bash
        run: |
          echo "::error::Downloader failed; data/raw progress was preserved when possible."
          exit 1
